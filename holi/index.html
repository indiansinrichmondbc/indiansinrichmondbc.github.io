<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Richmond, BC Holi 2026</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Gradient background and box styling -->
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      padding: 0;
      font-family: 'Noto Sans', Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ebf4ff 0%, #edd9fa 45%, #fbd6ea 100%);
      transition: background 0.6s;
    }
    .main-container {
      background: rgba(255,255,255,0.80);
      border-radius: 2rem;
      box-shadow: 0 8px 40px 0 rgba(80, 55, 134, 0.13);
      padding: 2.8rem 2.2rem;
      max-width: 440px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 36px;
      margin-bottom: 36px;
    }
    .gradient-title {
      font-size: 2.4rem;
      font-weight: 800;
      margin-bottom: 1.2rem;
      background: linear-gradient(90deg, #6d28d9 10%, #ec4899 55%, #3b82f6 80%);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
      text-align: center;
      animation: gradientMove 3s linear infinite;
    }
    @keyframes gradientMove {
      from { background-position: 0%; }
      to { background-position: 100%; }
    }
    .rsvp-btn {
      display: inline-block;
      padding: 0.8rem 2.4rem;
      border-radius: 999px;
      font-size: 1.14rem;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(90deg, #ec4899, #fbcf46, #a78bfa);
      background-size: 200% 100%;
      box-shadow: 0 2px 20px 0 rgb(80 55 134 / 7%);
      border: 2px solid rgba(255,255,255,0.6);
      margin-bottom: 1.2rem;
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: transform 0.15s, filter 0.18s;
    }
    .rsvp-btn:hover {
      transform: scale(1.05);
      filter: brightness(1.12);
      background-position-x: 100%;
    }
    .qr-container {
      margin: 1.2rem 0 0.8rem 0;
      width: 100%;
      max-width: 300px;
      aspect-ratio: 1/1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .info-text {
      color: #52525b;
      font-size: 0.93rem;
      margin-top: 1.2rem;
      text-align: center;
      line-height: 1.38;
    }
  </style>
  <!-- QRCode.js library (minified, MIT License, source: https://github.com/davidshimjs/qrcodejs) -->
  <script>
    /*! QRCode.js v1.0.0 MIT License */
    // Only implementation of QRCode library (minified for brevity; full source at github link)
    // Code below is abbreviated for context. You should paste the minified QRCode.js here or link to a CDN.
    // For demo, we'll use a CDN:
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
  <main class="main-container">
    <h1 class="gradient-title">Richmond, BC Holi 2026</h1>
    <a href="https://holi-mu-two.vercel.app/confirm" class="rsvp-btn" target="_blank" rel="noopener">RSVP Now</a>
    <div class="qr-container">
      <div id="qrcode"></div>
    </div>
    <span class="info-text">
      After completing RSVP, return here to download your ticket.<br>
      Event photos and offers will be shared on this contact method after the event.
    </span>
  </main>
  <script>
    // Generate QR code for /confirm
    var qrTarget = window.location.origin + '/confirm';
    if (!window.location.origin) {
      // Support for older browsers
      qrTarget = (window.location.protocol + '//' + window.location.host + '/confirm');
    }
    new QRCode(document.getElementById("qrcode"), {
      text: qrTarget,
      width: 256,
      height: 256,
      colorDark: "#3b82f6",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>
</body>
</html>
